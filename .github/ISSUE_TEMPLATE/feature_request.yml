name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. For larger changes, an issue like this is a great place to agree on the approach before any code is written.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or the pain point this would address.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? An API sketch or example is welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about, and why this one is better.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps explain the request.
