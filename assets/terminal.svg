<svg width="880" height="580" viewBox="0 0 880 580" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Cascadia Code','JetBrains Mono','Consolas','SFMono-Regular','Menlo',monospace" font-size="15">
  <defs>
    <linearGradient id="winBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1424"/>
      <stop offset="1" stop-color="#0a1019"/>
    </linearGradient>
    <linearGradient id="titleBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2436"/>
      <stop offset="1" stop-color="#131c2b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- window -->
  <g filter="url(#shadow)">
    <rect x="24" y="20" width="832" height="540" rx="16" fill="url(#winBody)" stroke="#1e293b" stroke-width="1"/>
    <path d="M24 36 a16 16 0 0 1 16 -16 h800 a16 16 0 0 1 16 16 v28 h-832 z" fill="url(#titleBar)"/>
  </g>
  <line x1="24" y1="64" x2="856" y2="64" stroke="#0b1220" stroke-width="1"/>

  <!-- traffic lights -->
  <circle cx="48" cy="42" r="6" fill="#ff5f57" stroke="#e0443e" stroke-width="0.5"/>
  <circle cx="70" cy="42" r="6" fill="#febc2e" stroke="#d89e26" stroke-width="0.5"/>
  <circle cx="92" cy="42" r="6" fill="#28c840" stroke="#1aab2e" stroke-width="0.5"/>
  <text x="440" y="47" text-anchor="middle" fill="#5b6b82" font-size="13" letter-spacing="0.5">vSQL  •  FXServer console</text>

  <!-- banner -->
  <g fill="#38bdf8" xml:space="preserve" filter="url(#glow)">
    <text x="44" y="104">__   __  ____    ___    _     </text>
    <text x="44" y="126">\ \ / / / ___|  / _ \  | |    </text>
    <text x="44" y="148"> \ V /  \___ \ | | | | | |    </text>
    <text x="44" y="170">  \_/    ___) || |_| | | |___ </text>
    <text x="44" y="192">         |____/  \__\_\ |_____|</text>
  </g>
  <text x="44" y="226" fill="#e2e8f0" letter-spacing="0.3">High-performance MySQL/MariaDB resource for FiveM</text>
  <text x="44" y="248" fill="#5b6b82">v1.0.0  <tspan fill="#38bdf8">•</tspan>  github.com/valerisn/vSQL</text>

  <!-- connection status panel -->
  <rect x="44" y="272" width="556" height="158" rx="12" fill="#0e1828" stroke="#1e3a4a"/>
  <rect x="44" y="272" width="4" height="158" rx="2" fill="url(#accent)"/>
  <circle cx="72" cy="306" r="5" fill="#28c840" filter="url(#glow)"/>
  <text x="88" y="311" fill="#e2e8f0">Connected to <tspan fill="#4ade80" font-weight="bold">MariaDB 10.11</tspan></text>
  <text x="88" y="335" fill="#5b6b82">localhost:3306/fivem</text>
  <g xml:space="preserve">
    <text x="72" y="371" fill="#cbd5e1">Pool        <tspan fill="#38bdf8" font-weight="bold">8</tspan><tspan fill="#5b6b82"> connections</tspan></text>
    <text x="72" y="394" fill="#cbd5e1">Cache       <tspan fill="#4ade80">enabled</tspan></text>
    <text x="72" y="417" fill="#cbd5e1">RETURNING   <tspan fill="#4ade80">enabled</tspan></text>
  </g>

  <!-- vsql top -->
  <text x="44" y="464" xml:space="preserve" fill="#e2e8f0"><tspan fill="#4ade80" font-weight="bold">❯ </tspan>vsql top</text>
  <text x="44" y="488"><tspan fill="#38bdf8">[vSQL]</tspan><tspan fill="#94a3b8"> top 2 query shapes by total time</tspan></text>
  <text x="44" y="511" xml:space="preserve"><tspan fill="#38bdf8" font-weight="bold">  1240ms</tspan><tspan fill="#5b6b82"> total   x4200, avg 0.3ms, max 5.1ms</tspan></text>
  <text x="44" y="534" xml:space="preserve" fill="#7c8aa0">    SELECT * FROM players WHERE id = ?</text>
</svg>
